name: Terraform
author: Sean Christians
description: Manage deployments with Terraform

inputs:
  module:
    description: Path to Terraform code.
    required: true
  tf_backend_s3_bucket:
    description: AWS S3 bucket name where the Terraform state file is stored.
    required: true
  aws_region:
    description: AWS region for authentication.
    required: true
  aws_role:
    description: AWS IAM role to authenticate to.
    required: true
  terraform_version:
    description: 'The version of Terraform CLI to install. Instead of full version string you can also specify constraint string starting with "<" (for example `<1.13.0`) to install the latest version satisfying the constraint. A value of `latest` will install the latest version of Terraform CLI. Defaults to `latest`.'
    default: "latest"

runs:
  using: composite
  steps:
    - name: Install Terraform
      uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      with:
        terraform_version: ${{ inputs.terraform_version }}

    - name: Terraform wrapper and environment
      shell: bash
      env:
        ACTION_BIN_PATH: ${{ github.action_path }}/bin
        TERRAFORM_MODULE: ${{ inputs.module }}
      run: |
        echo "TERRAFORM_MODULE=${TERRAFORM_MODULE}" >> $GITHUB_ENV
        echo "$ACTION_BIN_PATH" >> $GITHUB_PATH
        mkdir -p "$HOME/.terraform.d/plugin-cache"
        echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV
        echo "TF_IN_AUTOMATION=true" >> $GITHUB_ENV
        echo "TF_INPUT=false" >> $GITHUB_ENV

    - name: Select Terraform provisioning stage
      id: mode
      shell: bash
      env:
        MODE: ${{ github.ref_name == github.event.repository.default_branch && 'apply' || 'plan' }}
      run: |
        echo "mode=$MODE" >> $GITHUB_OUTPUT

    - name: Authenticate with AWS
      uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: ${{ inputs.aws_role }}

    - name: Download Terraform plugins from Cache
      id: cache-tf-plugins-restore
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.TF_PLUGIN_CACHE_DIR }}
        key: ${{ runner.os }}-terraform-plugins-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.module)) }}
        restore-keys: |
          ${{ runner.os }}-terraform-plugins-

    - name: Terraform Init
      shell: bash
      env:
        AWS_S3_BUCKET: ${{ inputs.tf_backend_s3_bucket }}
      run: |
        tf init -lockfile=readonly \
          -backend-config="bucket=${AWS_S3_BUCKET}" \

    - name: Cache Terraform plugins
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: ${{ ! steps.cache-tf-plugins-restore.outputs.cache-hit }}
      with:
        path: ${{ env.TF_PLUGIN_CACHE_DIR }}
        key: ${{ steps.cache-tf-plugins-restore.outputs.cache-primary-key }}

    - name: Terraform Validate
      if: steps.mode.outputs.mode == 'plan'
      shell: bash
      run: |
        tf validate

    - name: Terraform Plan
      if: steps.mode.outputs.mode == 'plan'
      shell: bash
      run: |
        tf plan -no-color -out="$HOME/tfplan"

    - name: Show plan in summary
      if: steps.mode.outputs.mode == 'plan'
      shell: bash
      run: |
        echo '```' >> $GITHUB_STEP_SUMMARY
        tf show -no-color "$HOME/tfplan" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Terraform Apply
      if: steps.mode.outputs.mode == 'apply'
      shell: bash
      run: |
        tf apply -auto-approve
