---
- name: Set up a Minecraft server
  hosts: minecraft_servers
  become: true
  tasks:
    - name: Create Minecraft data volume
      ansible.builtin.file:
        path: /etc/containers/volumes/minecraft
        state: directory

    - name: Podman network
      containers.podman.podman_network:
        name: minecraft
        state: quadlet
        quadlet_options:
          - IPv6=true
        opt:
          isolate: true

    - name: Minecraft pod
      containers.podman.podman_pod:
        name: minecraft
        network: minecraft.network
        publish:
          - 25565:25565/tcp
          - 19132:19132/udp
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target
        state: quadlet

    - name: Minecraft container
      vars:
        mods:
          - P7dR8mSH # fabric-api
          - wKkoqHrH:beta # Geyser
          - bWrNNfkb # Floodgate
          - gvQqBUqZ # Lithium
          - uXXizFIs # ferrite-core
          - Ha28R6CL # fabric-language-kotlin
          - OhduvhIc # Veinminer
          - datapack:ok5ehON9 # TreeCapitator
      containers.podman.podman_container:
        name: minecraft
        image: docker.io/itzg/minecraft-server:latest
        volume: /etc/containers/volumes/minecraft:/data:Z
        state: quadlet
        pod: minecraft.pod
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target
        env:
          VERSION: 26.1.2
          EULA: "true"
          TYPE: FABRIC
          MODRINTH_PROJECTS: "{{ mods | join(',') }}"
          MEMORY: 10G
          DIFFICULTY: normal
          ENABLE_COMMAND_BLOCK: true
          BROADCAST_CONSOLE_TO_OPS: true
          BROADCAST_RCON_TO_OPS: true
          SPAWN_PROTECTION: 0
          VANILLATWEAKS_SHARECODE: UEHYo3,8APkq2
          STOP_SERVER_ANNOUNCE_DELAY: 120
        stop_timeout: 150
      notify: Start Minecraft container

    - name: Playit.gg sidecar
      containers.podman.podman_container:
        name: playit-minecraft
        image: ghcr.io/playit-cloud/playit-agent:0.17
        pod: minecraft.pod
        state: quadlet
        env:
          SECRET_KEY: "{{ PLAYIT_GG_AGENT_KEY }}"
      notify: Start Playit.gg agent

  handlers:
    - name: Start Minecraft container
      ansible.builtin.systemd_service:
        daemon_reload: true
        name: minecraft
        state: restarted

    - name: Start Playit.gg agent
      ansible.builtin.systemd_service:
        daemon_reload: true
        name: playit-minecraft
        state: started
