name: Terraform
on:
  pull_request:
    paths:
      - infrastructure/**
      - "!infrastructure/backend/**"
  push:
    branches:
      - main
    paths:
      - infrastructure/**
      - "!infrastructure/backend/**"
      - services/minecraft-server/modrinth.lock.txt
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  id-token: write
  contents: read

env:
  PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
  PORKBUN_SECRET_API_KEY: ${{ secrets.PORKBUN_SECRET_API_KEY }}
  DESEC_API_TOKEN: ${{ secrets.DESEC_API_TOKEN }}

jobs:
  terraform:
    name: ${{ github.ref_name == github.event.repository.default_branch && 'apply' || 'plan' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate with Tailscale API
        env:
          CLIENT_ID: ${{ vars.TAILSCALE_CLIENT_ID }}
          AUDIENCE: ${{ format('api.tailscale.com/{0}', vars.TAILSCALE_CLIENT_ID) }}
        run: |
          ACCESS_TOKEN=$(
            curl -sSL --retry 5 --retry-all-errors -G \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            --data-urlencode "audience=$AUDIENCE" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value'
          )

          echo "TAILSCALE_OAUTH_CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV
          echo "TAILSCALE_IDENTITY_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Connect to Tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ vars.TAILSCALE_CLIENT_ID }}
          audience: ${{ format('api.tailscale.com/{0}', vars.TAILSCALE_CLIENT_ID) }}
          tags: tag:ci
          version: latest

      - name: SSH config
        run: cp -r infrastructure/.ssh/. ~/.ssh/

      - name: SSH config from Tailnet
        uses: seanchristians/lab/actions/ssh-config-tailnet@main

      - name: Terraform
        uses: seanchristians/lab/actions/terraform@main
        with:
          module: infrastructure
          tf_backend_s3_bucket: ${{ vars.TF_BACKEND_AWS_BUCKET }}
          aws_region: ${{ vars.TF_BACKEND_AWS_REGION }}
          aws_role: ${{ vars.TF_BACKEND_AWS_ROLE }}
          terraform_version: "v1.16.0-alpha20260626" # Required for 'store' blocks in terraform_data resources
