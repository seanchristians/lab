name: Verify Terraform Code Formatting
on:
  pull_request:
    paths:
      - "**.tf"

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  terraform-fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - run: |
          terraform fmt -recursive -check >> $GITHUB_STEP_SUMMARY
