name: Verify Terraform Code Formatting
on:
  pull_request:
    paths:
      - "**.tf"

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  terraform-fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
      - run: |
          terraform fmt -recursive -check >> $GITHUB_STEP_SUMMARY
