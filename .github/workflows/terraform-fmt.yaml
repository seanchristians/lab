name: Verify Terraform Code Formatting
on:
  pull_request:
    paths:
      - "**.tf"

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  terraform-fmt:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - run: |
          terraform fmt -recursive -check >> $GITHUB_STEP_SUMMARY
