---
- name: Set up a Minecraft server
  hosts: all
  tasks:
    - name: Create Minecraft data volume
      become_method: containers.podman.podman_unshare
      become: true
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/minecraft"
        state: directory
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"

    - name: Install Modrinth projects lock-file
      become_method: containers.podman.podman_unshare
      become: true
      ansible.builtin.copy:
        src: ../../services/minecraft-server/modrinth.lock.txt
        dest: "{{ ansible_env.HOME }}/minecraft/modrinth.lock.txt"
        owner: "{{ ansible_env.USER }}"
        group: "{{ ansible_env.USER }}"
        mode: 0444

    - name: Container network
      containers.podman.podman_network:
        name: minecraft
        opt:
          isolate: true
        quadlet_options:
          - IPv6=true
        state: quadlet

    - name: Pod
      containers.podman.podman_pod:
        name: minecraft
        network: minecraft.network
        publish:
          - 25565:25565/tcp # Java Minecraft
          - 19132:19132/udp # Bedrock Minecraft
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target
        state: quadlet

    - name: Game
      containers.podman.podman_container:
        name: minecraft
        image: docker.io/itzg/minecraft-server@sha256:1e6af837a25532c8567cd4130d1609391fdc472e9e37aecab9eac0d6f4ed7593 # 2026.6.0-java25-alpine
        env:
          VERSION: 26.1.2
          TYPE: FABRIC
          EULA: "true"
          MEMORY: 10G
          STOP_SERVER_ANNOUNCE_DELAY: 120
          ENABLE_WHITELIST: true
          ENABLE_QUERY: true
          MODRINTH_PROJECTS: "@/data/modrinth.lock.txt"
          VANILLATWEAKS_SHARECODE: UEHYo3,8APkq2
          DIFFICULTY: normal
          SPAWN_PROTECTION: 0
          ENABLE_COMMAND_BLOCK: true
          BROADCAST_CONSOLE_TO_OPS: true
          BROADCAST_RCON_TO_OPS: true
        pod: minecraft.pod
        quadlet_options:
          - |
            [Install]
            WantedBy=default.target
        restart_policy: always
        state: quadlet
        stop_timeout: 180
        attach: stdin
        tty: true
        volume: "{{ ansible_env.HOME }}/minecraft:/data:Z"
      notify: Start Minecraft container

    - name: Open Minecraft server ports
      become: true
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
      loop:
        - 25565/tcp
        - 19132/udp

  handlers:
    - name: Start Minecraft container
      ansible.builtin.systemd_service:
        daemon_reload: true
        scope: user
        name: minecraft
        enabled: true
        state: restarted
